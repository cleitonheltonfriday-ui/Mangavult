<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Mangavult</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════════════════ TELA: BIBLIOTECA ═══════════════════════════════ -->
<div id="tela-biblioteca" class="tela ativa">

  <header class="header-biblioteca">
    <button class="btn-icon" id="btn-menu-principal">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="logo-texto">Mangavult</span>
    <button class="btn-icon" id="btn-busca">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </header>

  <div class="biblioteca-lista" id="biblioteca-lista">
    <!-- obras renderizadas aqui -->
    <div class="biblioteca-vazia" id="biblioteca-vazia">
      <div class="vazia-icon">📚</div>
      <p>Sua biblioteca está vazia</p>
      <p class="vazia-sub">Importe um capítulo para começar</p>
    </div>
  </div>

  <button class="fab" id="btn-importar">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- ═══════════════════════════════ MODAL: IMPORTAR ═══════════════════════════════ -->
<div id="modal-importar" class="modal-overlay" style="display:none">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-titulo">Importar Capítulo</h2>

    <div class="import-opcoes">
      <label class="import-btn" id="label-zip">
        <input type="file" id="input-zip" accept=".zip" style="display:none">
        <div class="import-btn-icon">📦</div>
        <div class="import-btn-texto">
          <strong>Arquivo ZIP</strong>
          <span>Imagens numeradas (1.jpg, 2.png…)</span>
        </div>
      </label>

      <label class="import-btn" id="label-imgs">
        <input type="file" id="input-imgs" accept="image/*" multiple style="display:none">
        <div class="import-btn-icon">🖼️</div>
        <div class="import-btn-texto">
          <strong>Selecionar Imagens</strong>
          <span>Múltiplas imagens da galeria</span>
        </div>
      </label>

      <label class="import-btn" id="label-pdf">
        <input type="file" id="input-pdf" accept=".pdf" style="display:none">
        <div class="import-btn-icon">📄</div>
        <div class="import-btn-texto">
          <strong>Arquivo PDF</strong>
          <span>Converte páginas automaticamente</span>
        </div>
      </label>
    </div>

    <button class="btn-cancelar" id="btn-cancelar-import">Cancelar</button>
  </div>
</div>

<!-- ═══════════════════════════════ MODAL: FORMULÁRIO ═══════════════════════════════ -->
<div id="modal-formulario" class="modal-overlay" style="display:none">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-titulo" id="form-titulo">Novo Capítulo</h2>

    <div class="form-group">
      <label class="form-label">Nome da Obra</label>
      <input class="form-input" id="input-nome-obra" placeholder="Ex: One Punch Man" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Capítulo</label>
      <input class="form-input" id="input-capitulo" placeholder="Ex: 132" type="text" autocomplete="off">
    </div>

    <div id="progresso-import" style="display:none">
      <div class="progresso-barra-bg">
        <div class="progresso-barra-fill" id="progresso-fill"></div>
      </div>
      <p class="progresso-texto" id="progresso-texto">Processando…</p>
    </div>

    <div class="form-botoes">
      <button class="btn-secundario" id="btn-form-cancelar">Cancelar</button>
      <button class="btn-primario" id="btn-form-salvar">Importar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ MODAL: OBRA DETALHES ═══════════════════════════════ -->
<div id="modal-obra" class="modal-overlay" style="display:none">
  <div class="modal-sheet modal-obra-sheet">
    <div class="modal-handle"></div>
    <div class="obra-header-modal">
      <img id="obra-capa-modal" class="obra-capa-modal" src="" alt="">
      <div>
        <h2 class="obra-titulo-modal" id="obra-titulo-modal"></h2>
        <p class="obra-sub-modal" id="obra-sub-modal"></p>
      </div>
    </div>
    <div class="obra-acoes">
      <button class="btn-primario" id="btn-continuar-leitura">▶ Continuar Leitura</button>
      <button class="btn-secundario" id="btn-add-proximo">+ Próximo Capítulo</button>
    </div>
    <div class="capitulos-lista" id="capitulos-lista-modal"></div>
    <div class="obra-acoes" style="margin-top:8px">
      <button class="btn-perigo" id="btn-deletar-obra">Excluir Obra</button>
    </div>
    <button class="btn-fechar-modal" id="btn-fechar-obra">✕</button>
  </div>
</div>

<!-- ═══════════════════════════════ TELA: LEITOR ═══════════════════════════════ -->
<div id="tela-leitor" class="tela">

  <!-- Header leitor -->
  <div class="leitor-header" id="leitor-header">
    <div class="leitor-header-linha1">
      <button class="btn-icon btn-voltar" id="btn-voltar-biblioteca">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="leitor-titulo-wrap">
        <span class="leitor-obra-nome" id="leitor-obra-nome"></span>
      </div>
      <button class="btn-icon" id="btn-abrir-menu-leitor">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="leitor-header-linha2">
      <span class="leitor-badge" id="leitor-cap-badge"></span>
      <span class="leitor-badge leitor-pg-badge" id="leitor-pg-badge"></span>
      <button class="leitor-menu-btn" id="btn-menu-leitor-pill">Menu ‹</button>
    </div>
  </div>

  <!-- Área de páginas -->
  <div class="leitor-viewport" id="leitor-viewport">
    <div class="leitor-paginas" id="leitor-paginas"></div>

    <!-- Zonas de toque -->
    <div class="zona-toque zona-esq" id="zona-esq"></div>
    <div class="zona-toque zona-dir" id="zona-dir"></div>
  </div>

  <!-- Barra de progresso inferior -->
  <div class="leitor-footer" id="leitor-footer">
    <button class="nav-arrow" id="nav-prev">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="progresso-wrap">
      <input type="range" class="progresso-slider" id="progresso-slider" min="0" value="0">
      <div class="progresso-nums" id="progresso-nums"></div>
    </div>
    <button class="nav-arrow" id="nav-next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- Painel lateral (menu) -->
  <div class="painel-overlay" id="painel-overlay"></div>
  <div class="painel-lateral" id="painel-lateral">
    <button class="painel-fechar" id="btn-fechar-painel">✕</button>

    <div class="painel-obra-info">
      <div class="painel-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e05a28" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="painel-obra-nome" id="painel-obra-nome"></span>
      </div>
      <div class="painel-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        <span class="painel-cap-nome" id="painel-cap-nome"></span>
      </div>
    </div>

    <div class="painel-nav">
      <button class="painel-nav-arrow" id="painel-prev-pag">‹</button>
      <div class="painel-select-wrap">
        <div class="painel-select-label">Page</div>
        <div class="painel-select-val" id="painel-pag-val"></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <button class="painel-nav-arrow" id="painel-next-pag">›</button>
    </div>

    <div class="painel-nav">
      <button class="painel-nav-arrow" id="painel-prev-cap">‹</button>
      <div class="painel-select-wrap">
        <div class="painel-select-label">Chapter</div>
        <div class="painel-select-val" id="painel-cap-val"></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <button class="painel-nav-arrow" id="painel-next-cap">›</button>
    </div>

    <div class="painel-divisor"></div>

    <!-- Opções do leitor -->
    <button class="painel-opcao" id="opt-double-page" data-opt="doublePage">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Double Page
    </button>
    <button class="painel-opcao" id="opt-offset" data-opt="offsetSpreads">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
      Offset Double Spreads
    </button>
    <button class="painel-opcao" id="opt-fit" data-opt="fitMode">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      <span id="opt-fit-label">Fit Both</span>
    </button>
    <button class="painel-opcao" id="opt-rtl" data-opt="rtl">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
      Right To Left
    </button>
    <button class="painel-opcao" id="opt-header" data-opt="headerHidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      Header Hidden
    </button>
    <button class="painel-opcao painel-opcao-com-gear" id="opt-progress" data-opt="progressHidden">
      <div class="painel-opcao-esq">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg>
        Progress Hidden
      </div>
      <svg class="gear-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>

    <div class="painel-divisor"></div>

    <button class="painel-opcao painel-settings-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Reader Settings
    </button>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/db.js"></script>
<script src="js/importar.js"></script>
<script src="js/biblioteca.js"></script>
<script src="js/leitor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
